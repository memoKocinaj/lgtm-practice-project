
services:
  # --- MICROSERVICES ---
  order-service:
    image: python:3.11-slim
    volumes:
      - ${PWD}/apps:/app
    working_dir: /app
    environment:
      - SERVICE_NAME=order-service
      - PAYMENT_SERVICE_URL=http://payment-service:8002
      - OTEL_SERVICE_NAME=order-service
      - OTEL_EXPORTER_OTLP_ENDPOINT=http://otel-collector:4317
    ports:
      - "8001:8001"
    command: >
      sh -c "pip install -r requirements.txt &&
             opentelemetry-bootstrap -a install &&
             opentelemetry-instrument uvicorn app:app --host 0.0.0.0 --port 8001"

  payment-service:
    image: python:3.11-slim
    volumes:
      - ${PWD}/apps:/app
    working_dir: /app
    environment:
      - SERVICE_NAME=payment-service
      - OTEL_SERVICE_NAME=payment-service
      - OTEL_EXPORTER_OTLP_ENDPOINT=http://otel-collector:4317
    ports:
      - "8002:8002"
    command: >
      sh -c "pip install -r requirements.txt &&
             opentelemetry-bootstrap -a install &&
             opentelemetry-instrument uvicorn app:app --host 0.0.0.0 --port 8002"

  # --- TELEMETRY COLLECTOR ---
  otel-collector:
    image: otel/opentelemetry-collector-contrib:0.95.0
    volumes:
      - ./config/otel-collector.yaml:/etc/otel-collector.yaml
    command: ["--config=/etc/otel-collector.yaml"]
    ports:
      - "4317:4317" # OTLP gRPC receiver
      - "8889:8889" # Prometheus metrics exporter endpoint

  # --- LGTM BACKENDS ---
  loki:
    image: grafana/loki:2.9.4
    volumes:
      - ./loki-config.yaml:/etc/loki/local-config.yaml
    command: -config.file=/etc/loki/local-config.yaml
    ports:
      - "3100:3100"

  tempo:
    image: grafana/tempo:2.3.1
    command: [ "-config.file=/etc/tempo/tempo.yaml" ]
    volumes:
      - ./config/tempo.yaml:/etc/tempo/tempo.yaml
    ports:
      - "3200:3200"
#
#  mimir:
#    image: grafana/mimir:2.11.0
#    command: ["-ingenerate-config-file=true", "-target=all"]
#    ports:
#      - "9009:9009"

  prometheus:
    image: prom/prometheus:v2.49.1
    volumes:
      - ./config/prometheus.yml:/etc/prometheus/prometheus.yml
    command:
      - --config.file=/etc/prometheus/prometheus.yml
    ports:
      - "9090:9090"
    
  grafana:
    image: grafana/grafana:10.3.3
    ports:
      - "3000:3000"
    environment:
      - GF_AUTH_ANONYMOUS_ENABLED=true
      - GF_AUTH_ANONYMOUS_ORG_ROLE=Admin
    volumes:
      - ./grafana-datasources.yaml:/etc/grafana/provisioning/datasources/datasources.yaml
